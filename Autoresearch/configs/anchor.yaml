# Frozen Anchor Configuration: P8-Lean 50K (Seed 42)
# DO NOT MODIFY — this is the baseline for all AutoResearch experiments.

# Model architecture
num_layers: 3
hidden_dim: 224
num_heads: 4
ffn_multiplier: 3
dropout: 0.1

# Embeddings (compressed for P8-Lean)
species_embedding_dim: 48
move_embedding_dim: 24
item_embedding_dim: 16
ability_embedding_dim: 16
type_embedding_dim: 12

# Context window
max_window: 2

# Heads
auxiliary_loss_weight: 0.2
use_value_head: false
prune_dead_features: true

# Training
batch_size: 64
epochs: 30
learning_rate: 1.0e-4
weight_decay: 0.01
warmup_steps: 300
gradient_accumulation_steps: 1

# Data
num_battles: 50000
seed: 42

