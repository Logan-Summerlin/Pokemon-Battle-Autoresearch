# Codex Configuration for AutoResearch
# Restricts the Codex agent to only edit experiment files.
# All source code, data pipeline, and tests are read-only.

sandbox_mode = "workspace-write"
approval_policy = "auto-edit"

[sandbox_workspace_write]
# All source code (src/), scripts/, tests/, data/ are READ-ONLY.
# The agent can only modify Autoresearch/run_experiment.py.
writable_roots = ["Autoresearch/run_experiment.py"]
network_access = false
